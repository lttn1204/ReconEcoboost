# AI provider configuration.
#   claude       metered Messages API (needs ANTHROPIC_API_KEY)
#   claude-code  the `claude` CLI headless — uses your Pro/Max SUBSCRIPTION
#                (you must run `claude` and /login first; ANTHROPIC_API_KEY must
#                 be UNSET, or it bills the API instead of the subscription)
#   stub         offline placeholder (no network)
provider: claude-code
model: opus                 # for claude-code use a CLI alias (sonnet|opus) or a full id

# What the AI does:
#   off      tools only — no AI is invoked
#   assist   ONLY the generative wordlists (ai_subwords/ai_dirwords/ai_params feed the
#            brute stages) — NO post-run briefing / vuln hunting
#   analyze  assist + compile recon intelligence (tech + sensitive cases) for manual pentest
#   pentest  analyze + AI-driven vulnerability hunting
# Override per run with --ai-mode, or disable with --no-ai.
mode: analyze

params:
  max_tokens: 4096
  effort: high                # low | medium | high | xhigh | max
  # NOTE: temperature/top_p are intentionally omitted — Opus 4.8 rejects them.

# What the AI stages receive as context (token control):
#   curated  only the deterministic triage shortlist (ranked targets + guaranteed
#            method/param leads + their 1-hop neighbors), annotated with triage
#            score/tags/reasons — far fewer tokens. (default)
#   full     the entire knowledge graph (legacy; large on big scopes)
# Falls back to `full` automatically when no triage ranking exists.
context: curated

# How the budget is shared across subdomains:
#   global    one pooled ranking — the top-N best assets across ALL hosts
#   per_host  fair coverage — every live host root (optional) + each subdomain's
#             top-K URLs, round-robined so noisy subdomains can't crowd out quiet ones
context_scope: global

context_top_n: 120               # GLOBAL scope: total ranked targets across all hosts
context_per_host: 5             # PER_HOST scope: top URLs kept per subdomain
context_include_host_roots: true  # PER_HOST: always include every live host root
context_max_nodes: 60           # hard ceiling on nodes sent (incl. neighbors), either scope

prompts:
  dir: prompts

# Which prompt set the AI stages use (lets several versions coexist; A/B them).
#   v1  the original prompts  (prompts/web/recon_intel.md, pentest.md)
#   v2  research-tuned set: stronger role, vuln-class playbook, severity/confidence
#       rubric, few-shot example, anti-prompt-injection  (prompts/web/v2/*.md)
#   v3  post-recon FP-killer pentest: explicitly reasons over the already-collected
#       tool output, REQUIRES concrete request/response evidence per finding (the
#       `evidence` field), strict confirmed-vs-lead rubric  (prompts/web/v3/*.md)
#   v4  v3 + per-vuln-class CONFIRMATION STANDARD (passive recon can't confirm SQLi/
#       SSRF/IDOR → forced to leads), chain-of-thought `analysis` scratchpad,
#       `impact`+`confidence_score` fields, and a MANUAL-PENTEST DOSSIER (tech_stack
#       to research + manual_next_steps) so a human can keep testing  (prompts/web/v4/*.md)
#   v5  v4 + AGENTIC: feeds real captured response bodies, and (with agentic.enabled)
#       runs a live observe→reason→probe loop (guarded HTTP) to CONFIRM leads, exporting
#       agent-proposed fuzz wordlists. Synthesis cites the probe transcript (prompts/web/v5/*.md)
# Add more by creating prompts/web/<version>/<name>.md and setting this.
prompt_version: v5

# ai_pentest two-pass mode: after the first pass, run a second self-critique pass
# (prompts/web/<version>/pentest_verify.md) that re-verifies each candidate's evidence
# and drops/downgrades weak findings — fewer false positives at ~2x AI tokens. v4 and v5
# ship a pentest_verify prompt; with other versions the second pass is skipped.
# Override per-run with --ai-two-stage.
two_stage: false

# AGENTIC pentest (v5, B+C). When enabled, ai_pentest runs a live observe→reason→probe
# loop: the model plans non-destructive probes, the guarded HTTP client (scope/method/
# budget enforced) runs them, and the responses feed the next iteration — turning LEADS
# into CONFIRMED findings. OFF by default because it sends LIVE requests to your scope;
# only enable for AUTHORIZED targets. Turn on per-run with --ai-agentic. Needs v5 prompts.
agentic:
  enabled: false
  max_iterations: 6        # observe→probe rounds
  max_requests: 120        # hard cap on total live requests this run
  per_iteration_actions: 12  # probes the model may run per round
  methods: [GET, POST]     # allowlist; destructive verbs always refused
  rate_per_s: 3            # throttle between requests (politeness, no DoS)
  timeout_s: 15            # per-request timeout
  max_body_bytes: 20000    # response body captured per request (truncated)
  # Quota safety (subscription/Pro-Max). If the AI usage limit is hit mid-loop, the
  # agent CHECKPOINTS to results/<run>/agentic_state.json and pauses; re-running the
  # SAME command resumes from there when quota returns. max_ai_calls is a PROACTIVE
  # soft cap on AI calls this run (0 = off) — stop & checkpoint before exhausting quota.
  max_ai_calls: 0

budget:
  max_tokens_per_run: null

redaction:
  enabled: true
