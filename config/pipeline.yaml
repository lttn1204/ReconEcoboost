# Pipeline composition. Profiles select which stages run; the orchestrator
# resolves final order from each module's requires/produces edges.

domain: web

# Recursive subdomain/vhost discovery: re-feed found subdomains as new seeds.
#   1   single pass (no recursion) — the default
#   2   also scan subdomains-of-subdomains
#   100 keep going until no new subdomains are found (bounded by this number)
discovery:
  recursive_depth: 2

  # Cross-module discovery loop: re-run discovery/expansion stages so subdomains
  # found in page content (content_subdomains) or by brute get resolved, crawled
  # and re-mined recursively. Findings/analysis (nuclei, secret_scan, js_intel,
  # normalization, triage, AI) run ONCE at the end. Stops early when no new
  # subdomain appears. OFF by default (single pass = current behavior).
  loop:
    enabled: false
    rounds: 2          # max rounds when enabled (depth of the feedback loop)

# DNS resolution (dnsx): validate discovered subdomains, attach resolved IP(s),
# flag `internal` (RFC1918/loopback), and filter wildcard-DNS false positives.
# Also does active DNS brute-force: word.<apex> from a wordlist -> dnsx resolve.
# Resolved summary saved to results/<run_id>/dns_resolve.txt.
dns_resolve:
  wildcard_filter: true   # use dnsx -wd to drop wildcard-DNS noise
  # DNS resolvers for dnsx (used by dns_resolve AND permutation). Omit/null =>
  # use the OS resolver from /etc/resolv.conf (dnsx's public-resolver defaults
  # are silently empty when outbound UDP 53 is filtered). [] => dnsx defaults.
  # resolvers: ["1.1.1.1", "8.8.8.8"]
  #
  # Network position — which resolved IPs are reachable from where you run this.
  # Honoured by alive_detection (which hosts to probe) + vhost_discovery (which
  # IPs to fuzz). Internal-only hosts then also flow into dir_bruteforce.
  #   public   (default) only public IPs; internal-only hosts skipped (kept as intel)
  #   internal probe everything; for hosts with both, focus the internal IP (run from inside)
  #   both     probe everything; use all IPs
  prefer: both
  brute:
    enabled: true                          # generate word.<apex> and resolve (wildcard scope only)
    wordlist: wordlists/dns/httparchive_subdomains_2026_02_27.txt # any size — streamed, not loaded
    # Candidates = wordlist × APEX, STREAMED to a file and resolved via dnsx -l, so the
    # FULL wordlist (even millions of lines) runs with flat memory (~17MB for 3.2M). No
    # cap needed; set max_candidates only to LIMIT the brute (omit/0 = whole wordlist).
    # max_candidates: 0
    # depth: removed — brute targets the apex; sub-of-sub expansion is done by
    # permutation (alterx) + the discovery loop, not by multiplying word × every sub.

# Subdomain permutation (alterx -> dnsx) — ENUMERATION stage, wildcard scope only.
# Learns naming patterns from known subdomains and mutates them (api -> api-dev,
# dev-api, api2, ...), then resolves the candidates with dnsx; only resolving
# names are kept (with IP + `internal` flag), wildcard noise dropped. Both alterx
# and dnsx are REQUIRED (a missing binary fails the stage). New names are crawled/
# probed only when discovery.loop is enabled. Saved to results/<run_id>/permutation.txt.
permutation:
  enabled: true
  max_candidates: 5000   # cap candidates sent to dnsx (0/omit = all alterx output)

# TLS cert SAN/CN subdomains (tlsx) — pulls every hostname a cert is valid for off
# the known hosts; surfaces siblings DNS/passive missed. Out-of-scope SANs dropped.
# Saved to results/<run_id>/tls_intel.txt.
tls_intel:
  enabled: true

# GitHub code-search subdomains (github-subdomains) — mines subdomains leaked in
# public GitHub code/configs. Needs a GitHub token: set env GITHUB_TOKEN, or put it
# in config/tools.local.yaml (gitignored) as github_subdomains.token. No token => the
# stage is SKIPPED. Saved to results/<run_id>/github_subdomains.txt.
github_subdomains:
  enabled: false
  # token: ""            # prefer GITHUB_TOKEN env; this is a fallback (keep in *.local.yaml)

# GitHub leaked-secret scan (trufflehog) — scans an org's / repos' GitHub history for
# committed secrets, VERIFIED against the provider by default (cuts false positives).
# Works per org/repo (NOT domain search), so set orgs/repos (or auto_org to guess the
# org from the apex label). Needs GITHUB_TOKEN. No token / no org+repo => SKIPPED.
# Findings -> kind "secret". Saved to results/<run_id>/github_secrets.{txt,json}.
github_secrets:
  enabled: true
  orgs: []               # GitHub org name(s) to scan, e.g. ["lpbank"]
  repos: []              # specific repos, e.g. ["org/repo"]
  auto_org: false        # also guess org from the apex label (off — avoids scanning a stranger's org)
  verify: true           # trufflehog verification (pings provider; set false to stay fully passive)
  results: verified,unknown   # which result types to keep (verified|unknown|unverified, comma list)
  redact: false          # store full secret value (true = mask it)
  timeout_s: 1800        # whole-stage timeout (org scans can be large)

# Virtual-host fuzzing (ffuf) — ENUMERATION stage, so it only runs when the scope
# enumerates (wildcard). Fuzzes Host: FUZZ.<apex> against each reachable IP dnsx
# found (+ the apex), finds DNS-less vhosts, registers them directly as live
# hosts. Results saved to results/<run_id>/vhost.txt.
vhost_discovery:
  enabled: true
  schemes: [https, http]   # fuzz both
  auto_calibrate: true     # ffuf -ac: drop catch-all false positives
  max_ips: 50              # cap distinct IPs fuzzed (configurable)

# Active crawl (katana). BOUNDED by default — katana otherwise crawls a host with
# NO page/time limit, so a huge site (e.g. a Google property) streams gigabytes that
# get buffered in memory and OOM-kill the run. Tune these for big authorized scopes.
crawling:
  depth: 3               # katana -d max crawl depth
  max_domain_pages: 2000 # katana -mdp pages per domain (default is UNLIMITED — the OOM guard)
  crawl_duration: 5m     # katana -ct hard time cap per host (s/m/h/d)
  # field_scope: rdn     # dn | rdn | fqdn — katana default rdn; set fqdn to stay on the exact host
  # js_crawl: true       # katana -jc: parse endpoints out of JS while crawling

# Directory brute-force (feroxbuster) — RECURSIVE content discovery. Finds nested
# content (/admin/users, /api/v1/internal) a flat fuzz misses, tests every method in
# one run, and auto-filters wildcard/catch-all responses. recursion.depth caps how
# deep it descends (recursion can multiply work — raise carefully). match_status is
# the "found"/recursable set (covers redirects + protected 401/403 dirs, not just 200).
dir_bruteforce:
  methods: [GET,POST]          # HTTP methods to test (feroxbuster -m, all in one run)
  recursion:
    enabled: true
    depth: 3              # 0/disabled = flat; 1 = one level deeper (default, safe); 2+ = deeper (heavier)
    force: false          # --force-recursion: recurse on EVERY found endpoint (incl 401/403), more aggressive
  match_status: [200, 204, 301, 302, 307, 308, 401, 403, 405]  # statuses treated as found
  extract_links: false    # feroxbuster link-extraction off (katana already crawls links)
  # extensions: [php, bak, json]   # -x: also try these file extensions on each word

# alive_detection (httpx): probes subdomains that pass the dns_resolve.prefer filter.
# Internal-only hosts are skipped when prefer=public (default), or probed when
# prefer=internal/both. Seeds are always probed.
alive_detection:
  timeout_s: 15    # per-connection timeout (httpx -t); raise for slow/internal targets

# url_probe (httpx): validate discovered URLs (crawl/gau/dir) so nuclei only scans
# live ones. gau can surface hundreds of thousands of URLs, so the set is capped to
# bound memory (giant stdin + one JSON line buffered per URL). 0 = no cap.
url_probe:
  timeout_s: 15
  max_urls: 100000   # cap URLs probed in one httpx run (OOM guard; raise if needed)

# Deterministic triage (no LLM): ranks assets by signal and groups noise.
# Inspired by uro (declutter), reNgine (interesting keywords), gf-patterns
# (per-vuln-class params) — but non-destructive: nothing is dropped, only
# demoted/grouped. Results saved to results/<run_id>/triage.{json,txt}.
triage:
  top_n: 75              # how many ranked targets to surface (report shortlist)
  cluster_threshold: 5  # >= N URLs sharing host+status+length => catch-all noise
  # weights:            # optional overrides (defaults in analysis/triage.py)
  #   method_anomaly: 60
  #   param_vuln_class: 35
  #   secret: 90
  #   catch_all: -50

# Shared JS/JSON fetch: fetches bodies ONCE with httpx for both secret_scan and
# js_intel (no duplicate requests). Selects URLs by extension OR live status.
# Bodies cached under results/<run_id>/responses/.
js_fetch:
  enabled: true         # turn the whole JS-body fetch (and thus both consumers) on/off
  extensions: [js, json, map, txt, xml, yml, yaml, env, config, bak]
  scan_status: [200]    # ALSO fetch live URLs with these statuses (any extension);
                        #   covers dir-fuzz + URL-history hits. [] = extensions only.
  max_urls: 5000        # how many URLs to fetch. Bodies stream to disk (not RAM), so
                        #   this is a TIME/network bound now, NOT a memory one — raise
                        #   freely (or 0 = all) to scan more JS for secrets. (Was 500 to
                        #   avoid OOM when bodies were buffered in memory; no longer needed.)
  conn_timeout_s: 15    # per-connection timeout (httpx -t); slow hosts (e.g. F5/BigIP
                        #   ~8s) drop their body at httpx's 5s default -> missing secrets
  # timeout_s: 600      # overall subprocess timeout for the whole batch (executor)

# API discovery (httpx) — actively probe each live host for exposed OpenAPI/Swagger
# specs (/openapi.json, /v2/api-docs, /swagger.json …) and GraphQL endpoints. A
# readable spec is parsed into its endpoints+params (emitted as url assets so triage/
# param_discovery/nuclei pick them up) + a finding; a reachable GraphQL endpoint is
# flagged. Saved to results/<run_id>/api.{txt,json}.
api_discovery:
  enabled: true
  max_hosts: 50         # cap live hosts probed
  graphql: true         # also probe /graphql endpoints
  http_timeout_s: 15    # httpx -t per-connection timeout (slow hosts)
  timeout_s: 900        # whole-stage timeout
  # extra_paths: ["/internal/openapi.json"]  # extra spec paths to probe

# Hidden-parameter discovery (arjun) — find params endpoints accept but no link
# reveals (IDOR/SQLi/SSRF surface). Runs AFTER js_fetch so it can mine candidate
# param names from the already-fetched JS bodies (var/let/const, object keys, URL
# params) + reuse param names seen on other URLs; merges them with arjun's built-in
# 25k list + the ai_params AI seam, then validates per endpoint with arjun's
# binary-search. Discovered params are baked into the URL so triage scores them.
# Saved to results/<run_id>/params.{txt,json} (+ candidate/wordlist/target files).
param_discovery:
  enabled: true
  engine: arjun         # arjun (default) | x8 (faster Rust drop-in, add to tools.yaml)
  methods: [GET,POST]        # GET / POST / JSON / XML — one arjun pass each (work multiplies)
  max_urls: 50          # cap endpoints fuzzed (deduped by path; from LIVE urls). Param
                        #   fuzzing is heavy on slow hosts — lower this if it times out.
  timeout_s: 1800       # whole-stage timeout for arjun (default executor 600s is too low)
  threads: 15           # arjun -t concurrent threads (latency-bound work parallelizes)
  http_timeout_s: 15    # arjun -T per-request timeout (slow F5/BigIP hosts ~8s)
  stable: false         # arjun --stable: more accurate but markedly slower; opt-in
  # chunk_size: 256     # arjun -c params per request (omit = arjun auto)
  # wordlist: ...       # base param wordlist (omit = arjun's built-in db/large.txt)

# Secret scanning (leaklens-style): regex-scan the fetched bodies for exposed
# secrets. Matches redacted before storage. results/<run_id>/secrets.{json,txt}.
secret_scan:
  # Shannon-entropy detection (detect-secrets/trufflehog style) — catches random
  # secrets that match no regex. Higher recall + more false positives, so OFF by
  # default; enable for deep audits and tune thresholds (base64 ~4.5, hex ~3.0).
  entropy:
    enabled: false
    base64_threshold: 4.5
    hex_threshold: 3.0
    min_length: 20

# JS intelligence (leaklens-style): mine endpoints/hosts/cloud-URLs/source-maps
# from the fetched JS. Endpoints -> url assets, in-scope hosts -> subdomain assets
# (feed triage/AI/report); cloud buckets + source maps -> findings.
# Results saved to results/<run_id>/js_intel.{json,txt}.
js_intel:
  enabled: true         # turn this step on/off
  max_per_file: 200     # cap endpoints extracted per file

# Subdomains referenced in page content (HTML/JS/CSP) — separate, toggleable step
# (independent of js_intel). Reads the same js_fetch bodies, regex-extracts
# in-scope subdomains of the apex, persists them. results/<run_id>/content_subdomains.txt
content_subdomains:
  enabled: true

# Generative AI wordlists — ask the LLM for TARGET-SPECIFIC candidates and write them
# to the Phase-0 seam files the brute stages already read (ai_subwords.txt feeds
# dns_resolve+permutation, ai_dirwords.txt feeds dir_bruteforce, ai_params.txt feeds
# param_discovery). Each runs where its best context exists (subwords early from
# observed names, dirwords from crawled paths, params from fetched JS) and makes ONE
# schema-constrained call. Inert when AI is off (--no-ai / ai-mode off). max_words caps
# how many candidates each adds. Saved to results/<run_id>/ai_*.txt.
ai_subwords: { enabled: true, max_words: 150 }
ai_dirwords: { enabled: true, max_words: 150 }
ai_params:   { enabled: true, max_words: 100 }

profiles:
  default:
    stages:
      - asset_discovery
      - github_subdomains
      - ai_subwords
      - vhost_discovery
      - dns_resolve
      - permutation
      - tls_intel
      - github_secrets
      - alive_detection
      - api_discovery
      - crawling
      - historical_urls
      - ai_dirwords
      - tech_fingerprint
      - dir_bruteforce
      - url_probe
      - js_fetch
      - ai_params
      - param_discovery
      - secret_scan
      - js_intel
      - content_subdomains
      - nuclei_scan
      - normalization
      - triage
      - ai_recon_intel
      - ai_pentest
  quick:
    stages:
      - asset_discovery
      - alive_detection
      - tech_fingerprint

  # Test ONLY the targets you pass on the CLI — no subdomain enumeration.
  # Use with: reconecoboost a.com.vn elearning.a.com.vn --run --profile direct
  direct:
    stages:
      - alive_detection
      - api_discovery
      - crawling
      - historical_urls
      - tech_fingerprint
      - dir_bruteforce
      - url_probe
      - js_fetch
      - param_discovery
      - secret_scan
      - js_intel
      - content_subdomains
      - nuclei_scan
      - normalization
      - triage
      - ai_recon_intel
      - ai_pentest
